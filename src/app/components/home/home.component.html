<main class="flex-grow max-w-5xl w-full mx-auto p-6 space-y-8 flex flex-col justify-center">
  <div class="text-center space-y-3 max-w-xl mx-auto py-6">
    <h2 class="text-3xl font-black tracking-tight text-white mt-3 bg-gradient-to-r from-white via-slate-100 to-brand-cyan bg-clip-text text-transparent uppercase tracking-wider">
      {{ t('HOME.SELECT_MODE') }}
    </h2>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-3 gap-3 sm:gap-6">
    <!-- Películas Card -->
    <button 
      type="button" 
      (click)="setGameMode('movies')"
      style="--glow-color: 162, 25, 199;"
      class="clapper-card h-[290px] text-left cursor-pointer group">
      <div class="clapper-bar brand-purple"></div>
      <div class="clapper-body">
        <div class="clapper-card-content justify-between p-5">
          <div class="space-y-2 w-full">
            <!-- Imagen Fija de Películas -->
            <div class="relative w-full h-24 rounded-lg overflow-hidden border border-obsidian-900 bg-obsidian-950">
              <img src="assets/peliculass.jpeg" alt="Películas" class="w-full h-full object-cover" />
            </div>
            <h3 class="text-lg font-black text-white group-hover:text-brand-purple transition-colors duration-200">
              {{ t('NAVBAR.MOVIES') }}
            </h3>
            <p class="hidden sm:block text-[10px] text-slate-400 leading-relaxed line-clamp-2">
              {{ t('HOME.MOVIES_DESC') }}
            </p>
          </div>
          <div class="flex justify-between items-center mt-2 w-full">
            <span class="text-3xs font-black uppercase tracking-widest text-brand-purple">
              {{ t('HOME.PLAY_MOVIES') }}
            </span>
            <span class="w-7 h-7 rounded-full bg-brand-purple/10 border border-brand-purple/20 flex items-center justify-center text-brand-purple group-hover:bg-brand-purple group-hover:text-white transition duration-300">
              ➔
            </span>
          </div>
        </div>
      </div>
    </button>

    <!-- TV Series Card -->
    <button 
      type="button" 
      (click)="setGameMode('series')"
      style="--glow-color: 20, 202, 216;"
      class="clapper-card h-[290px] text-left cursor-pointer group">
      <div class="clapper-bar brand-cyan"></div>
      <div class="clapper-body">
        <div class="clapper-card-content justify-between p-5">
          <div class="space-y-2 w-full">
            <!-- Imagen Fija de Series -->
            <div class="relative w-full h-24 rounded-lg overflow-hidden border border-obsidian-900 bg-obsidian-950">
              <img src="assets/series.jpg" alt="Series de TV" class="w-full h-full object-cover" />
            </div>
            <h3 class="text-lg font-black text-white group-hover:text-brand-cyan transition-colors duration-200">
              {{ t('NAVBAR.SERIES') }}
            </h3>
            <p class="hidden sm:block text-[10px] text-slate-400 leading-relaxed line-clamp-2">
              {{ t('HOME.SERIES_DESC') }}
            </p>
          </div>
          <div class="flex justify-between items-center mt-2 w-full">
            <span class="text-3xs font-black uppercase tracking-widest text-brand-cyan">
              {{ t('HOME.PLAY_SERIES') }}
            </span>
            <span class="w-7 h-7 rounded-full bg-brand-cyan/10 border border-brand-cyan/20 flex items-center justify-center text-brand-cyan group-hover:bg-brand-cyan group-hover:text-white transition duration-300">
              ➔
            </span>
          </div>
        </div>
      </div>
    </button>

    <!-- Anime Card -->
    <button 
      type="button" 
      (click)="setGameMode('anime')"
      style="--glow-color: 249, 115, 22;"
      class="clapper-card h-[290px] text-left cursor-pointer group">
      <div class="clapper-bar brand-orange"></div>
      <div class="clapper-body">
        <div class="clapper-card-content justify-between p-5">
          <div class="space-y-2 w-full">
            <!-- Imagen Fija de Anime -->
            <div class="relative w-full h-24 rounded-lg overflow-hidden border border-obsidian-900 bg-obsidian-950">
              <img src="assets/anime.png" alt="Modo Anime" class="w-full h-full object-cover" />
            </div>
            <h3 class="text-lg font-black text-white group-hover:text-brand-orange transition-colors duration-200">
              {{ t('NAVBAR.ANIME') }}
            </h3>
            <p class="hidden sm:block text-[10px] text-slate-400 leading-relaxed line-clamp-2">
              {{ t('HOME.ANIME_DESC') }}
            </p>
          </div>
          <div class="flex justify-between items-center mt-2 w-full">
            <span class="text-3xs font-black uppercase tracking-widest text-orange-400">
              {{ t('HOME.PLAY_ANIME') }}
            </span>
            <span class="w-7 h-7 rounded-full bg-orange-400/10 border border-orange-400/20 flex items-center justify-center text-orange-400 group-hover:bg-orange-400 group-hover:text-white transition duration-300">
              ➔
            </span>
          </div>
        </div>
      </div>
    </button>

    <!-- Daily Challenge Card -->
    <button 
      type="button" 
      (click)="setGameMode('daily')"
      style="--glow-color: 98, 82, 206;"
      class="clapper-card h-[290px] text-left cursor-pointer group">
      <div class="clapper-bar brand-indigo"></div>
      <div class="clapper-body">
        <div class="clapper-card-content justify-between p-5">
          <div class="space-y-2 w-full">
            <!-- Imagen Fija de Daily Challenge -->
            <div class="relative w-full h-24 rounded-lg overflow-hidden border border-obsidian-900 bg-obsidian-950">
              <img src="../../../assets/daily.avif" alt="Daily Challenge" class="w-full h-full object-cover" />
            </div>
            <h3 class="text-lg font-black text-white group-hover:text-brand-indigo transition-colors duration-200">
              {{ t('NAVBAR.DAILY') }}
            </h3>
            <p class="hidden sm:block text-[10px] text-slate-400 leading-relaxed line-clamp-2">
              {{ t('HOME.DAILY_DESC') }}
            </p>
          </div>
          <div class="flex justify-between items-center mt-2 w-full">
            <span class="text-3xs font-black uppercase tracking-widest text-brand-indigo">
              {{ t('HOME.PLAY_DAILY') }}
            </span>
            <span class="w-7 h-7 rounded-full bg-brand-indigo/10 border border-brand-indigo/20 flex items-center justify-center text-brand-indigo group-hover:bg-brand-indigo group-hover:text-white transition duration-300">
              ➔
            </span>
          </div>
        </div>
      </div>
    </button>

    <!-- Random Mode Card -->
    <button 
      type="button" 
      (click)="setGameMode('random')"
      style="--glow-color: 234, 179, 8;"
      class="clapper-card h-[290px] text-left cursor-pointer group">
      <div class="clapper-bar brand-yellow"></div>
      <div class="clapper-body">
        <div class="clapper-card-content justify-between p-5">
          <div class="space-y-2 w-full">
            <!-- Imagen Fija de Modo Aleatorio -->
            <div class="relative w-full h-24 rounded-lg overflow-hidden border border-obsidian-900 bg-obsidian-950">
              <img src="../../../assets/random.jpg" alt="Modo Aleatorio" class="w-full h-full object-cover" />
            </div>
            <h3 class="text-lg font-black text-white group-hover:text-brand-yellow transition-colors duration-200">
              {{ t('NAVBAR.RANDOM') }}
            </h3>
            <p class="hidden sm:block text-[10px] text-slate-400 leading-relaxed line-clamp-2">
              {{ t('HOME.RANDOM_DESC') }}
            </p>
          </div>
          <div class="flex justify-between items-center mt-2 w-full">
            <span class="text-3xs font-black uppercase tracking-widest text-brand-yellow">
              {{ t('HOME.PLAY_RANDOM') }}
            </span>
            <span class="w-7 h-7 rounded-full bg-brand-yellow/10 border border-brand-yellow/20 flex items-center justify-center text-brand-yellow group-hover:bg-brand-yellow group-hover:text-white transition duration-300">
              ➔
            </span>
          </div>
        </div>
      </div>
    </button>
  </div>
</main>
