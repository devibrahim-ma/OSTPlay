<header class="bg-obsidian-950/40 backdrop-blur-md sticky top-0 z-40 px-6 py-4 flex items-center justify-between min-h-[85px]">
  <!-- Left: Navigation buttons -->
  <div class="flex items-center w-1/4 gap-2">
    <!-- Back Arrow (Icon only) -->
    <button 
      *ngIf="currentView() !== 'modes'"
      type="button"
      (click)="goBack()"
      class="text-xs font-bold p-2 bg-slate-900/60 backdrop-blur-md text-slate-300 border border-slate-800/80 rounded-full hover:border-brand-purple/40 hover:text-white transition duration-200 flex items-center justify-center cursor-pointer w-9 h-9 shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-brand-purple" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button>

    <!-- Home / Modes Button -->
    <button 
      *ngIf="currentView() !== 'modes'"
      type="button"
      (click)="goToModes()"
      class="text-xs font-bold px-3 py-2 bg-slate-900/60 backdrop-blur-md text-slate-300 border border-slate-800/80 rounded-full hover:border-brand-purple/40 hover:text-white transition duration-200 flex items-center gap-1.5 cursor-pointer h-9 shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-brand-purple" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      </svg>
      <span class="hidden sm:inline">{{ t('NAVBAR.GAME_MODES') }}</span>
    </button>
  </div>

  <!-- Center: Brand Animated Logo -->
  <div class="w-2/4 flex justify-center">
    <button (click)="goToModes()" class="flex items-center gap-2 sm:gap-3 select-none active:scale-98 transition duration-200 cursor-pointer">
      <img src="assets/logo.png" alt="OSTPlay Logo" class="w-7 h-7 sm:w-9 sm:h-9 logo-animated" />
      <h1 class="text-lg sm:text-2xl font-black font-display tracking-widest bg-gradient-to-r from-brand-cyan via-brand-indigo to-brand-purple bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(20,202,216,0.15)] select-none">
        OSTPLAY
      </h1>
    </button>
  </div>

  <!-- Right: Global Actions (Progreso Button) -->
  <div class="flex items-center justify-end w-1/4 gap-2 sm:gap-3">
    <!-- Language Selector Dropdown -->
    <div class="relative flex items-center">
      <button 
        type="button" 
        (click)="toggleLangDropdown($event)"
        class="flex items-center justify-center transition duration-200 hover:opacity-85 cursor-pointer select-none">
        <img 
          [src]="currentLang() === 'es' ? 'https://flagcdn.com/w40/es.png' : 'https://flagcdn.com/w40/gb.png'" 
          [alt]="currentLang()" 
          class="w-6 h-4 object-cover rounded shadow-2xs" />
      </button>

      <!-- Language selector dropdown menu -->
      <div 
        *ngIf="showLangDropdown" 
        class="absolute right-0 top-full mt-2 w-32 bg-slate-950/90 border border-slate-800/80 rounded-xl p-1 shadow-2xl backdrop-blur-xl z-50">
        <button 
          type="button" 
          (click)="selectLanguage('es')"
          [class.bg-slate-900]="currentLang() === 'es'"
          class="w-full text-left px-3 py-2 text-xs font-semibold rounded-lg hover:bg-slate-900 hover:text-white text-slate-300 transition duration-200 flex items-center gap-2 cursor-pointer">
          <img src="https://flagcdn.com/w40/es.png" alt="ES" class="w-5 h-3.5 object-cover rounded shadow-3xs" />
          Español
        </button>
        <button 
          type="button" 
          (click)="selectLanguage('en')"
          [class.bg-slate-900]="currentLang() === 'en'"
          class="w-full text-left px-3 py-2 text-xs font-semibold rounded-lg hover:bg-slate-900 hover:text-white text-slate-300 transition duration-200 flex items-center gap-2 cursor-pointer">
          <img src="https://flagcdn.com/w40/gb.png" alt="EN" class="w-5 h-3.5 object-cover rounded shadow-3xs" />
          English
        </button>
      </div>
    </div>

    <!-- Progreso/Perfil Button -->
    <div class="relative" *ngIf="authService.currentUser() !== null">
      <button 
        type="button"
        (click)="goToProfile()"
        class="flex items-center gap-0 sm:gap-2 transition cursor-pointer select-none border-0 bg-transparent p-0 sm:border sm:border-slate-800/80 sm:bg-slate-950/40 sm:hover:border-brand-purple/40 sm:pl-1.5 sm:pr-3 sm:py-1 sm:rounded-full">
        
        <!-- Small User Avatar -->
        <div class="w-9 h-9 sm:w-7 sm:h-7 rounded-full flex items-center justify-center overflow-hidden border border-slate-700/80"
             [ngClass]="authService.getAvatar(authService.currentUser()!.avatarId).gradient">
          <img [src]="authService.getAvatar(authService.currentUser()!.avatarId).avatarUrl" 
               [alt]="authService.currentUser()?.username" 
               class="w-full h-full object-cover" />
        </div>

        <span class="hidden sm:inline font-bold text-slate-300">{{ authService.currentUser()?.username }}</span>
      </button>
    </div>
  </div>
</header>
