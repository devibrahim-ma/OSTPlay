<div class="flex items-center justify-between px-4 py-2.5 bg-obsidian-950/40 border border-slate-800/80 rounded-2xl shadow-xl backdrop-blur-md w-full relative overflow-hidden select-none">
  <!-- Subtle top gradient stripe -->
  <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-orange-500 via-yellow-500 to-brand-cyan"></div>

  <div class="flex items-center gap-2">
    <span class="text-base animate-pulse">🔥</span>
    <div>
      <span class="text-[9px] uppercase tracking-wider font-extrabold text-slate-500 block leading-none">{{ t('NAVBAR.STREAK') }}</span>
      <span class="text-sm font-black text-white leading-none mt-1 block">
        <span class="text-brand-cyan font-mono">{{ currentStreak }}</span>
      </span>
    </div>
  </div>
  <div class="text-right flex items-center gap-1.5 border-l border-slate-800/50 pl-4">
    <div>
      <span class="text-[8px] uppercase tracking-wider font-bold text-slate-500 block leading-none">{{ t('NAVBAR.MAX_STREAK') }}</span>
      <span class="text-xs font-black text-slate-300 font-mono mt-1 block">{{ maxStreak }}</span>
    </div>
  </div>
</div>
