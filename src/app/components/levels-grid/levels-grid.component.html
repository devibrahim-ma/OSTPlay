<main class="flex-grow max-w-6xl w-full mx-auto p-6 space-y-8">
  <div class="text-center space-y-2 max-w-xl mx-auto py-6">
    <h2 class="text-3xl font-black tracking-tight text-white mt-3 bg-gradient-to-r from-white via-slate-100 to-brand-cyan bg-clip-text text-transparent">
      Selecciona una Banda Sonora
    </h2>
    <p class="text-xs text-slate-400 leading-relaxed">
      Elige cualquier nivel disponible para comenzar. Acierta antes de agotar tus 5 intentos. Los niveles acertados se marcarán en verde y los fallidos en rojo.
    </p>
  </div>
  <!-- Pagination Controls -->
  <div *ngIf="!isLoadingLevels() && totalPages() > 1" class="flex flex-wrap justify-center items-center gap-2.5 pb-2 select-none">
    <button 
      *ngFor="let idx of pageIndices()"
      type="button"
      (click)="setPage(idx)"
      [ngClass]="{
        'bg-brand-purple border-brand-purple text-white shadow-lg shadow-brand-purple/20 scale-105 font-bold': currentPageChecked() === idx,
        'bg-obsidian-900/40 border-slate-800 text-slate-400 hover:text-white hover:border-slate-700 hover:bg-obsidian-900/60': currentPageChecked() !== idx
      }"
      class="px-4 py-2 text-xs rounded-xl border transition-all duration-200 cursor-pointer active:scale-95">
      {{ getPageLabel(idx) }}
    </button>
  </div>

  <!-- Loading levels state -->
  <div *ngIf="isLoadingLevels()" class="flex flex-col items-center justify-center py-20 gap-4 text-center">
    <span class="w-10 h-10 rounded-full border-4 border-brand-purple/10 border-t-brand-cyan animate-spin"></span>
    <div>
      <span class="block text-xs font-bold text-brand-cyan uppercase tracking-widest">Cargando Cartelera</span>
      <span class="text-3xs text-slate-500 mt-1 block">Conectando a Firestore para traer los niveles...</span>
    </div>
  </div>

  <!-- Scalable Levels Grid (Styled like cinema clapperboards with white & black top bars) -->
  <div *ngIf="!isLoadingLevels()" class="grid grid-cols-2 sm:grid-cols-3 md:col-span-4 lg:grid-cols-5 gap-4">
    <button 
      *ngFor="let level of paginatedLevels(); let idx = index"
      type="button"
      (click)="selectLevel(idx + currentPageChecked() * pageSize)"
      [ngClass]="{
        'won': levelStatuses()[level.levelId] === 'won',
        'lost': levelStatuses()[level.levelId] === 'lost'
      }"
      class="clapper-card h-[135px] text-left transition duration-200 relative overflow-visible group active:scale-95 bg-no-repeat cursor-pointer">
      
      <!-- Standard black and white clapper bar -->
      <div class="clapper-bar"></div>

      <!-- Clapper Body -->
      <div class="clapper-body"
        [style.backgroundImage]="(levelStatuses()[level.levelId] === 'won' || levelStatuses()[level.levelId] === 'lost') && level.hints.frameUrl ? 'url(' + level.hints.frameUrl + ')' : ''"
        [style.backgroundSize]="'cover'"
        [style.backgroundPosition]="'center'">
        
        <!-- Dark tint overlay for won/lost items with image background -->
        <div *ngIf="levelStatuses()[level.levelId] === 'won' || levelStatuses()[level.levelId] === 'lost'" class="absolute inset-0 bg-obsidian-950/75 z-0 group-hover:bg-obsidian-950/55 transition-colors duration-200"></div>
 
        <!-- Glowing background indicator on hover -->
        <div class="absolute inset-0 bg-gradient-to-tr from-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"
          [ngClass]="{
            'to-brand-purple/5': levelStatuses()[level.levelId] === 'neutral',
            'to-emerald-500/10': levelStatuses()[level.levelId] === 'won',
            'to-rose-500/10': levelStatuses()[level.levelId] === 'lost'
          }">
        </div>

        <!-- Clapper Content Wrapper (Hollywood Production / Slate Style) -->
        <div class="clapper-card-content justify-start p-3 pt-4 text-left font-mono tracking-tight text-[10px] leading-tight text-slate-300 select-none relative z-10 h-full w-full flex flex-col">
          <div class="w-full text-center text-[7px] font-black text-slate-500 tracking-wider mb-2 uppercase">
            OSTPLAY PRODUCTION
          </div>
          
          <div class="w-full border-b border-slate-700 pb-0.5 mb-1.5 flex justify-between items-center">
            <span class="text-slate-400">Nivel:</span>
            <span class="font-bold text-white text-xs">{{ (idx + 1 + currentPageChecked() * pageSize) < 10 ? '0' : '' }}{{ idx + 1 + currentPageChecked() * pageSize }}</span>
          </div>

          <div class="w-full border-b border-slate-700 pb-0.5 mb-1.5 flex justify-between items-center">
            <span class="text-slate-400">Estado:</span>
            <span class="font-bold uppercase tracking-wider text-[8px]" 
                  [ngClass]="{
                    'text-emerald-400': levelStatuses()[level.levelId] === 'won',
                    'text-rose-500': levelStatuses()[level.levelId] === 'lost',
                    'text-slate-500': levelStatuses()[level.levelId] === 'neutral'
                  }">
              {{ levelStatuses()[level.levelId] === 'won' ? 'RESUELTO' : (levelStatuses()[level.levelId] === 'lost' ? 'FALLADO' : 'POR JUGAR') }}
            </span>
          </div>

          <div class="w-full border-b border-slate-700 pb-0.5 flex justify-between items-center truncate">
            <span class="text-slate-400">Titulo:</span>
            <span class="font-bold text-brand-cyan truncate max-w-[95px] text-right text-[8px]">
              {{ levelStatuses()[level.levelId] === 'won' ? level.title : (levelStatuses()[level.levelId] === 'lost' ? level.title : '???') }}
            </span>
          </div>
        </div>
      </div>
    </button>
  </div>
</main>
