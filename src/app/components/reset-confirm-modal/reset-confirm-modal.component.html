<div 
  *ngIf="showResetConfirm()" 
  class="fixed inset-0 bg-slate-950/80 z-[99999] flex items-center justify-center p-4 backdrop-blur-md animate-fade-in">
  
  <div 
    class="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-sm w-full shadow-2xl shadow-red-500/5 text-center space-y-6 relative overflow-hidden"
    (click)="$event.stopPropagation()">
    
    <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-red-500 to-orange-500"></div>

    <div class="space-y-3">
      <h3 class="text-xs font-bold text-red-500 uppercase tracking-widest mt-2">{{ t('RESET_MODAL.TITLE') }}</h3>
      <p class="text-xs text-slate-300 leading-relaxed pt-1">
        {{ t('RESET_MODAL.DESCRIPTION') }}
      </p>
    </div>

    <div class="flex gap-3 pt-2">
      <button 
        type="button" 
        (click)="cancelReset()"
        class="flex-1 py-3 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-700/80 text-white text-2xs font-black uppercase tracking-wider rounded-xl transition duration-200 cursor-pointer">
        {{ t('RESET_MODAL.CANCEL') }}
      </button>
      <button 
        type="button" 
        (click)="confirmReset()"
        class="flex-1 py-3 px-4 bg-red-600 hover:bg-red-500 text-white text-2xs font-black uppercase tracking-wider rounded-xl shadow-lg shadow-red-600/20 transition duration-200 cursor-pointer">
        {{ t('RESET_MODAL.CONFIRM') }}
      </button>
    </div>

  </div>
</div>
