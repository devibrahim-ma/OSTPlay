<div class="relative overflow-visible">
  <!-- Form elements -->

  <form (ngSubmit)="onSubmit()" class="relative z-10 space-y-4">
    <div class="relative">
      <label for="guess-input" class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">
        {{ t('GAME.WRITE_RESPONSE') }}
      </label>
      
      <div class="relative">
        <!-- Text Input with Custom Autocomplete -->
        <input 
          id="guess-input"
          type="text" 
          name="userGuess"
          [(ngModel)]="guessValue"
          (input)="onInputChange()"
          (focus)="onInputFocus()"
          (keydown)="onKeyDown($event)"
          [placeholder]="t('GAME.GUESS_PLACEHOLDER')"
          autocomplete="off"
          class="w-full bg-obsidian-950 border border-obsidian-800 rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500/25 transition duration-200" />
        
        <!-- Custom floating glassmorphic suggestions card -->
        <div 
          *ngIf="showSuggestions && filteredOptions.length > 0" 
          class="absolute z-50 left-0 right-0 mt-2 max-h-56 overflow-y-auto rounded-xl glass-panel shadow-2xl divide-y divide-obsidian-800 border border-obsidian-700/50"
          style="background-color: rgba(13, 15, 23, 0.96);">
          <button
            *ngFor="let option of filteredOptions; let i = index"
            type="button"
            (click)="selectOption(option)"
            [class.bg-teal-500/10]="i === activeSuggestionIndex"
            [class.text-teal-400]="i === activeSuggestionIndex"
            [class.text-slate-300]="i !== activeSuggestionIndex"
            class="w-full text-left px-4 py-2.5 text-xs font-semibold hover:bg-teal-500/5 hover:text-teal-400 transition-colors flex items-center gap-2 cursor-pointer">
            <span>🎬</span>
            <span>{{ option }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Submit Guess Button -->
    <button 
      type="submit"
      [disabled]="!guessValue.trim()"
      class="w-full py-3 px-6 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-600 hover:to-emerald-600 disabled:from-obsidian-800 disabled:to-obsidian-800 disabled:text-slate-600 text-slate-950 font-extrabold rounded-xl shadow-lg hover:shadow-teal-500/10 transition-all duration-200 active:scale-[0.99] flex items-center justify-center gap-2 group">
      <span>{{ t('GAME.SUBMIT') }}</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" />
      </svg>
    </button>
  </form>
</div>
